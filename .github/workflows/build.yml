name: Final-Build-PitagoraV3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # 1. 汚れたソースリストを一度全消去
      - name: Reset NuGet Sources
        run: |
          dotnet nuget locals all --clear
          dotnet nuget list source | find "http" && (for /f "tokens=2" %a in ('dotnet nuget list source ^| find "Enabled"') do dotnet nuget remove source %a) || echo "No sources to remove"
        shell: cmd
        continue-on-error: true

      # 2. 正しいURLだけを再登録
      - name: Add Correct NuGet Sources
        run: |
          dotnet nuget add source https://nuget.org --name nuget.org
          dotnet nuget add source https://myget.org --name Siv3D

      # 3. ビルド実行（キャッシュなしで確実に通す）
      - name: Publish
        run: |
          dotnet publish PitagoraEngineV3.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ../dist `
            -v n

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PitagoraEngineV3-Final-EXE
          path: ../dist/

name: Build-CSharp-Pitagora
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Publish EXE
        run: dotnet publish PitagoraEngineV3.csproj -c Release
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PitagoraEngineV3-EXE
          path: bin/Release/net8.0-windows/win-x64/publish/

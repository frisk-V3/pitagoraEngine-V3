name: Robust-Fast-Build-PitagoraV3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # エラー対策：ソースがあるか確認してから追加（または一度消して追加）
      - name: Add Siv3D NuGet Source Safely
        run: |
          dotnet nuget list source | findstr "Siv3D" > nul
          if %errorlevel% neq 0 (
            dotnet nuget add source https://myget.org --name Siv3D
          )
        shell: cmd

      - name: Publish
        run: |
          dotnet publish PitagoraEngineV3.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ../dist `
            -v m `
            /m

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: PitagoraEngineV3-Final-EXE
          path: ../dist/

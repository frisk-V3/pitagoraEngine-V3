name: Manual-Build-PitagoraV3

# 手動実行スイッチをオン！
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore PitagoraEngineV3.csproj

      - name: Publish (Single EXE)
        # -p:PublishSingleFile=true でバラバラのDLLを1つのexeに合体させます
        run: |
          dotnet publish PitagoraEngineV3.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitagoraEngineV3-Release-EXE
          # ビルド結果が格納されるパスを指定
          path: bin/Release/net8.0-windows/win-x64/publish/
